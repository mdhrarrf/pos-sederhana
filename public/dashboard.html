<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - POS Sederhana</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">POS Sederhana</div>
        <div class="nav-links">
            <button class="nav-btn active" onclick="showTab('tab-kasir')">Dashboard</button>
            <button class="nav-btn" onclick="showTab('tab-produk')">Produk</button>
            <button class="nav-btn" onclick="showTab('tab-riwayat')">Transaksi</button>
            <button class="nav-btn btn-danger" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="container main-content">
        <!-- TAB KASIR (DASHBOARD) -->
        <div id="tab-kasir" class="tab-content active">
            <div class="section-header">
                <h2>Dashboard Kasir</h2>
            </div>
            <div class="row">
                <div class="col-8">
                    <div class="card mb-20">
                        <h3>Daftar Produk</h3>
                        <div class="product-grid" id="posProductList">
                            <!-- Produk akan dirender -->
                        </div>
                    </div>
                </div>
                <div class="col-4">
                    <div class="card mb-20">
                        <h3>Keranjang Belanja</h3>
                        <div id="cartItems" class="cart-items">
                            <!-- Keranjang -->
                        </div>
                        <div class="cart-total">
                            <h4>Total Rp <span id="cartTotal">0</span></h4>
                        </div>
                        <button class="btn btn-primary w-100 mt-15" onclick="prosesTransaksi()">Simpan Transaksi</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- TAB PRODUK -->
        <div id="tab-produk" class="tab-content">
            <div class="section-header">
                <h2>Manajemen Produk</h2>
            </div>
            
            <div class="card mb-20">
                <form id="formProduk" class="row align-end">
                    <input type="hidden" id="prodId">
                    <div class="col-3 form-group">
                        <label>Nama Produk</label>
                        <input type="text" id="prodName" placeholder="Contoh: Buku Tulis" required class="w-100">
                    </div>
                    <div class="col-3 form-group">
                        <label>Harga (Rp)</label>
                        <input type="number" id="prodPrice" placeholder="Contoh: 5000" required class="w-100">
                    </div>
                    <div class="col-3 form-group">
                        <label>Stok Tersedia</label>
                        <input type="number" id="prodStock" placeholder="Contoh: 100" required class="w-100">
                    </div>
                    <div class="col-3 form-group">
                        <button type="submit" class="btn btn-primary w-100" id="btnSimpanProduk">Tambah Produk</button>
                    </div>
                </form>
            </div>
            
            <div class="card mb-20">
                <div class="table-responsive">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Nama Produk</th>
                                <th>Harga</th>
                                <th>Stok</th>
                                <th width="160" class="text-center">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="tableProdukBody">
                            <!-- Tabel produk -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- TAB RIWAYAT (TRANSAKSI) -->
        <div id="tab-riwayat" class="tab-content">
            <div class="section-header">
                <h2>Riwayat Transaksi</h2>
            </div>
            <div class="card mb-20">
                <div class="table-responsive">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>ID Transaksi</th>
                                <th>Tanggal & Waktu</th>
                                <th>Detail Item</th>
                                <th>Total Belanja</th>
                            </tr>
                        </thead>
                        <tbody id="tableRiwayatBody">
                            <!-- Tabel Riwayat -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        if (localStorage.getItem('pos_logged_in') !== 'true') {
            window.location.href = 'index.html';
        }
        function logout() {
            localStorage.removeItem('pos_logged_in');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
