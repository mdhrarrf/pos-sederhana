<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - POS Sederhana</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">POS Sederhana</div>
        <div class="nav-links">
            <button class="nav-btn active" onclick="showTab('tab-kasir')">Kasir</button>
            <button class="nav-btn" onclick="showTab('tab-produk')">Produk</button>
            <button class="nav-btn" onclick="showTab('tab-riwayat')">Riwayat</button>
            <button class="nav-btn btn-danger" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="container main-content">
        <!-- TAB KASIR -->
        <div id="tab-kasir" class="tab-content active">
            <h2>Transaksi Kasir</h2>
            <div class="row">
                <div class="col-8">
                    <div class="card">
                        <h3>Pilih Produk</h3>
                        <div class="product-grid" id="posProductList">
                            <!-- Produk akan dirender disini -->
                        </div>
                    </div>
                </div>
                <div class="col-4">
                    <div class="card">
                        <h3>Keranjang</h3>
                        <div id="cartItems" class="cart-items">
                            <!-- Keranjang -->
                        </div>
                        <div class="cart-total">
                            <h4>Total: Rp <span id="cartTotal">0</span></h4>
                        </div>
                        <button class="btn btn-primary w-100 mt-10" onclick="prosesTransaksi()">Simpan Transaksi</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- TAB PRODUK -->
        <div id="tab-produk" class="tab-content">
            <h2>Manajemen Produk</h2>
            <div class="card mt-10">
                <form id="formProduk" class="row">
                    <input type="hidden" id="prodId">
                    <div class="col-3">
                        <input type="text" id="prodName" placeholder="Nama Produk" required class="w-100">
                    </div>
                    <div class="col-3">
                        <input type="number" id="prodPrice" placeholder="Harga" required class="w-100">
                    </div>
                    <div class="col-3">
                        <input type="number" id="prodStock" placeholder="Stok" required class="w-100">
                    </div>
                    <div class="col-3">
                        <button type="submit" class="btn btn-success w-100" id="btnSimpanProduk">Tambah Produk</button>
                    </div>
                </form>
            </div>
            <div class="card mt-10">
                <table class="table">
                    <thead>
                        <tr>
                            <th>Nama Produk</th>
                            <th>Harga</th>
                            <th>Stok</th>
                            <th width="150">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tableProdukBody">
                        <!-- Tabel produk -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- TAB RIWAYAT -->
        <div id="tab-riwayat" class="tab-content">
            <h2>Riwayat Transaksi</h2>
            <div class="card mt-10">
                <table class="table">
                    <thead>
                        <tr>
                            <th>ID Transaksi</th>
                            <th>Tanggal</th>
                            <th>Item dibeli</th>
                            <th>Total Harga</th>
                        </tr>
                    </thead>
                    <tbody id="tableRiwayatBody">
                        <!-- Tabel Riwayat -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        if (localStorage.getItem('pos_logged_in') !== 'true') {
            window.location.href = 'index.html';
        }
        function logout() {
            localStorage.removeItem('pos_logged_in');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
